<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PCIP Digital Twin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-000: #050D1C;
    --navy-100: #0A1628;
    --navy-200: #122038;
    --ink:      #F1F5FB;
    --ink-dim:  rgba(241,245,251,0.72);
    --ink-mute: rgba(241,245,251,0.52);
    --hair:     rgba(241,245,251,0.14);
    --hair-soft:rgba(241,245,251,0.08);
    --cyan:     #6FD9FF;
    --violet:   #B794FF;
    --amber:    #FFC66B;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--navy-000); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }

  /* ---------- STAGE ---------- */
  .stage {
    position: relative;
    width: 100%;
    min-height: 100vh;
    overflow: hidden;
    isolation: isolate;
  }
  .bg-img {
    position: absolute; inset: 0;
    background-image: url("assets/cover.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 0;
  }
  /* Cinematic scrim — darkens left, lets right breathe */
  .scrim {
    position: absolute; inset: 0;
    z-index: 1;
    pointer-events: none;
  }
  .scrim.cinematic {
    background:
      radial-gradient(ellipse 70% 90% at 18% 45%, rgba(5,13,28,0.88) 0%, rgba(5,13,28,0.55) 45%, rgba(5,13,28,0.10) 75%, rgba(5,13,28,0.0) 100%),
      linear-gradient(180deg, rgba(5,13,28,0.55) 0%, rgba(5,13,28,0.15) 30%, rgba(5,13,28,0.10) 60%, rgba(5,13,28,0.75) 100%),
      linear-gradient(90deg, rgba(5,13,28,0.40) 0%, rgba(5,13,28,0.08) 45%, rgba(5,13,28,0.0) 70%);
  }
  .scrim.soft {
    background:
      linear-gradient(180deg, rgba(5,13,28,0.35) 0%, rgba(5,13,28,0.10) 35%, rgba(5,13,28,0.10) 55%, rgba(5,13,28,0.70) 100%),
      linear-gradient(90deg, rgba(5,13,28,0.55) 0%, rgba(5,13,28,0.0) 55%);
  }
  .scrim.wash {
    background: linear-gradient(rgba(10,22,40,0.55), rgba(10,22,40,0.55));
  }
  /* subtle grain for richness */
  .grain {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    opacity: 0.06; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.9'/></svg>");
  }

  /* ---------- TOP BAR ---------- */
  .topbar {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 56px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, var(--cyan) 0%, var(--violet) 100%);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 10px 30px -10px rgba(111,217,255,0.6);
    position: relative;
  }
  .brand-mark::after {
    content: ""; position: absolute; inset: 6px; border-radius: 4px;
    background: var(--navy-000);
  }
  .brand-mark::before {
    content: ""; position: absolute; left: 50%; top: 50%; width: 8px; height: 8px; border-radius: 50%;
    transform: translate(-50%,-50%);
    background: var(--amber);
    box-shadow: 0 0 10px var(--amber);
    z-index: 1;
  }
  .brand-text { display: flex; flex-direction: column; line-height: 1; }
  .brand-text b { font-family: 'Inter'; font-weight: 600; letter-spacing: 0.02em; font-size: 14px; }
  .brand-text span { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--ink-mute); margin-top: 4px; letter-spacing: 0.12em; text-transform: uppercase;}
  .topnav { display: flex; gap: 28px; font-size: 13px; color: var(--ink-dim); }
  .topnav a { color: inherit; text-decoration: none; }
  .topnav a:hover { color: var(--ink); }
  .topnav .pill {
    display:inline-flex; align-items:center; gap:8px;
    padding: 7px 14px; border: 1px solid var(--hair); border-radius: 999px;
    background: rgba(255,255,255,0.02); backdrop-filter: blur(8px);
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #4ADE80; box-shadow: 0 0 8px #4ADE80; }

  /* ---------- HERO ---------- */
  .hero {
    position: relative; z-index: 10;
    padding: 64px 56px 40px;
    max-width: 900px;
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono';
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--cyan);
    padding: 6px 12px 6px 10px;
    border: 1px solid rgba(111,217,255,0.28);
    border-radius: 999px;
    background: rgba(111,217,255,0.06);
    margin-bottom: 28px;
  }
  .eyebrow .tick { width: 6px; height: 6px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }

  h1.hero-title {
    font-family: 'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight: 400;
    font-size: clamp(48px, 7.2vw, 104px);
    line-height: 0.96;
    letter-spacing: -0.025em;
    margin: 0;
    color: var(--ink);
    text-wrap: balance;
  }
  h1.hero-title .pcip {
    font-family: 'Inter';
    font-weight: 500;
    letter-spacing: 0.02em;
    font-size: 0.58em;
    display: inline-block;
    padding: 0.12em 0.38em 0.16em;
    border: 1px solid var(--hair);
    border-radius: 0.22em;
    vertical-align: 0.18em;
    margin-right: 0.18em;
    background: rgba(255,255,255,0.04);
  }
  h1.hero-title em {
    font-style: italic;
    font-weight: 300;
    background: linear-gradient(100deg, var(--cyan) 0%, var(--violet) 60%, var(--amber) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  /* alt title treatment: solid ink italic */
  .title-ink h1.hero-title em {
    background: none; -webkit-text-fill-color: var(--ink); color: var(--ink);
    font-style: italic;
  }
  .title-serif-all h1.hero-title .pcip {
    font-family: 'Fraunces'; font-weight: 300; font-size: 1em; border: none; background: none; padding: 0;
    letter-spacing: -0.02em;
  }

  p.subtitle {
    font-family: 'Inter';
    font-weight: 300;
    font-size: clamp(17px, 1.3vw, 20px);
    line-height: 1.55;
    color: var(--ink-dim);
    margin: 28px 0 0;
    max-width: 640px;
    text-wrap: pretty;
  }
  p.subtitle cite {
    font-style: italic; font-family: 'Fraunces'; font-weight: 300; color: var(--ink);
  }

  .ctas { display: flex; gap: 12px; margin-top: 36px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 13px 20px;
    border-radius: 10px;
    font: 500 14px/1 'Inter';
    letter-spacing: 0.01em;
    cursor: pointer;
    border: 1px solid transparent;
    transition: transform .15s ease, background .2s ease, border-color .2s ease;
    text-decoration: none;
  }
  .btn-primary {
    background: var(--ink); color: var(--navy-000);
    box-shadow: 0 10px 40px -10px rgba(241,245,251,0.35);
  }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-ghost {
    background: rgba(255,255,255,0.04);
    border-color: var(--hair);
    color: var(--ink);
    backdrop-filter: blur(10px);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.22); }
  .btn .arr { font-family: 'JetBrains Mono'; font-size: 12px; opacity: 0.8;}

  /* meta strip */
  .meta-strip {
    position: relative; z-index: 10;
    display: flex; gap: 40px; flex-wrap: wrap;
    padding: 0 56px;
    margin-top: 56px;
    font-family: 'JetBrains Mono';
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .meta-strip .m { display: flex; flex-direction: column; gap: 6px; }
  .meta-strip .m b { font-family: 'Inter'; font-weight: 500; letter-spacing: 0.01em; text-transform: none; font-size: 14px; color: var(--ink); }

  /* ---------- FEATURE CARDS ---------- */
  .cards-wrap {
    position: relative; z-index: 10;
    padding: 72px 56px 48px;
  }
  .cards-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 24px;
  }
  .cards-head h3 {
    font-family: 'Fraunces'; font-weight: 400; font-style: italic;
    font-size: 22px; margin: 0; color: var(--ink);
    letter-spacing: -0.01em;
  }
  .cards-head .rule {
    flex: 1; height: 1px; background: var(--hair-soft); margin: 0 24px;
  }
  .cards-head .count {
    font-family: 'JetBrains Mono'; font-size: 11px; color: var(--ink-mute);
    letter-spacing: 0.18em;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--hair-soft);
    border: 1px solid var(--hair-soft);
    border-radius: 16px;
    overflow: hidden;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .card {
    background: rgba(10,22,40,0.55);
    padding: 28px 28px 28px;
    min-height: 240px;
    display: flex; flex-direction: column;
    position: relative;
    transition: background 0.25s ease;
  }
  .card:hover { background: rgba(18,32,56,0.72); }
  .card .idx {
    font-family: 'JetBrains Mono'; font-size: 11px; letter-spacing: 0.22em;
    color: var(--ink-mute);
  }
  .card h4 {
    font-family: 'Fraunces'; font-weight: 400;
    font-size: 26px; line-height: 1.1; margin: 14px 0 10px;
    color: var(--ink); letter-spacing: -0.01em;
  }
  .card p {
    font-size: 14px; line-height: 1.55; color: var(--ink-dim); margin: 0;
    text-wrap: pretty;
  }
  .card .status {
    margin-top: auto; padding-top: 20px;
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono'; font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .card .status .d {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .card.available .status { color: #86EFAC; }
  .card.available .d { background: #4ADE80; box-shadow: 0 0 8px #4ADE80; }
  .card.soon .status { color: var(--ink-mute); }
  .card.soon .d { background: var(--ink-mute); }
  .card .accent {
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--cyan), transparent);
    opacity: 0.0; transition: opacity .3s;
  }
  .card.available .accent { opacity: 0.85; }
  .card:nth-child(2) .accent { background: linear-gradient(90deg, var(--violet), transparent); }
  .card:nth-child(3) .accent { background: linear-gradient(90deg, var(--amber), transparent); }

  /* alt card treatment: floating cards */
  .cards-float .cards {
    background: transparent; border: none; gap: 16px; border-radius: 0;
    backdrop-filter: none;
  }
  .cards-float .card {
    background: rgba(10,22,40,0.62);
    border: 1px solid var(--hair);
    border-radius: 14px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  /* alt card treatment: minimal listing (no card chrome) */
  .cards-list .cards {
    background: transparent; border: none; border-radius: 0;
    backdrop-filter: none;
    grid-template-columns: 1fr;
    gap: 0;
  }
  .cards-list .card {
    background: transparent;
    border-top: 1px solid var(--hair-soft);
    padding: 28px 0;
    min-height: 0;
    display: grid;
    grid-template-columns: 120px 1.2fr 2fr 140px;
    gap: 32px;
    align-items: baseline;
  }
  .cards-list .card:hover { background: transparent; }
  .cards-list .card:last-child { border-bottom: 1px solid var(--hair-soft); }
  .cards-list .card h4 { margin: 0; font-size: 22px; }
  .cards-list .card .accent { display: none; }
  .cards-list .card .status { margin-top: 0; padding-top: 0; }

  /* ---------- FOOTER ---------- */
  footer {
    position: relative; z-index: 10;
    padding: 28px 56px 36px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono'; font-size: 11px; letter-spacing: 0.14em;
    color: var(--ink-mute); text-transform: uppercase;
  }
  footer a { color: var(--ink-dim); text-decoration: none; margin-left: 20px; }
  footer a:hover { color: var(--ink); }

  /* ---------- ALT TYPE ---------- */
  .type-instrument h1.hero-title,
  .type-instrument .cards-head h3,
  .type-instrument .card h4,
  .type-instrument p.subtitle cite {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
  }
  .type-instrument h1.hero-title { letter-spacing: -0.015em; }

  @media (max-width: 880px) {
    .cards { grid-template-columns: 1fr; }
    .cards-list .card { grid-template-columns: 1fr; gap: 8px; }
    .topbar, .hero, .meta-strip, .cards-wrap, footer { padding-left: 24px; padding-right: 24px; }
    .topnav { display: none; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "scrim": "cinematic",
  "titleTreatment": "gradient",
  "cardStyle": "joined",
  "typeface": "fraunces",
  "showGrain": true,
  "showMeta": true
}/*EDITMODE-END*/;

function App() {
  const { values, setValue } = useTweaks(TWEAK_DEFAULTS);

  const cls = [
    values.titleTreatment === "ink" && "title-ink",
    values.titleTreatment === "serif-all" && "title-serif-all",
    values.cardStyle === "floating" && "cards-float",
    values.cardStyle === "list" && "cards-list",
    values.typeface === "instrument" && "type-instrument",
  ].filter(Boolean).join(" ");

  return (
    <div className={"stage " + cls} data-screen-label="01 Hero">
      <div className="bg-img" />
      <div className={"scrim " + values.scrim} />
      {values.showGrain && <div className="grain" />}

      <header className="topbar">
        <div className="brand">
          <div className="brand-mark" />
          <div className="brand-text">
            <b>PCIP · Digital Twin</b>
            <span>v0.1 · research preview</span>
          </div>
        </div>
        <nav className="topnav">
          <a href="#">Overview</a>
          <a href="#">Sensitivity</a>
          <a href="#">Simulation</a>
          <a href="#">Estimation</a>
          <a href="#" className="pill"><span className="dot" /> Streamlit live</a>
        </nav>
      </header>

      <section className="hero">
        <div className="eyebrow"><span className="tick" /> Research preview · companion to the paper</div>
        <h1 className="hero-title">
          <span className="pcip">PCIP</span>
          <br />
          Digital Twin for<br />
          <em>personalized cognition.</em>
        </h1>
        <p className="subtitle">
          A browser-based companion to <cite>A Digital-Twin Model for Personalized Cognitive Intervention Programs</cite>. Explore the model interactively — vary parameters, run full-scale simulations, and recover latent structure from synthetic data.
        </p>
        <div className="ctas">
          <a className="btn btn-primary" href="#">Open sensitivity analysis <span className="arr">→</span></a>
          <a className="btn btn-ghost" href="#">Read the paper</a>
        </div>
      </section>

      {values.showMeta && (
        <div className="meta-strip">
          <div className="m"><span>Model</span><b>Digital-twin · latent-state</b></div>
          <div className="m"><span>Policies</span><b>Staircase / random</b></div>
          <div className="m"><span>Runtime</span><b>Streamlit Cloud · free tier</b></div>
          <div className="m"><span>Status</span><b>1 of 3 modules live</b></div>
        </div>
      )}

      <section className="cards-wrap">
        <div className="cards-head">
          <h3>Three ways in</h3>
          <div className="rule" />
          <div className="count">01 — 03</div>
        </div>
        <div className="cards">
          <article className="card available">
            <div className="accent" />
            <div className="idx">01 · INSPECT</div>
            <h4>Sensitivity Analysis</h4>
            <p>Inspect each model component in isolation. Sliders let you vary parameters and watch the response shift in real time.</p>
            <div className="status"><span className="d" /> Available now</div>
          </article>
          <article className="card soon">
            <div className="accent" />
            <div className="idx">02 · RUN</div>
            <h4>Simulation</h4>
            <p>Run a full-scale intervention program under different policies — staircase vs. random — and compare learning trajectories.</p>
            <div className="status"><span className="d" /> Coming soon</div>
          </article>
          <article className="card soon">
            <div className="accent" />
            <div className="idx">03 · RECOVER</div>
            <h4>Estimation</h4>
            <p>Recover latent parameters from simulated data. Restricted to a small configuration so it fits within the Streamlit free tier.</p>
            <div className="status"><span className="d" /> Coming soon</div>
          </article>
        </div>
      </section>

      <footer>
        <div>© 2026 · PCIP Digital Twin</div>
        <div>
          <a href="#">Source</a>
          <a href="#">Paper</a>
          <a href="#">Notes</a>
        </div>
      </footer>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Background treatment">
          <TweakRadio
            label="Scrim"
            value={values.scrim}
            onChange={v => setValue("scrim", v)}
            options={[
              { value: "cinematic", label: "Cinematic (left-dark)" },
              { value: "soft",      label: "Soft (top + left)" },
              { value: "wash",      label: "Flat wash (original)" },
            ]}
          />
          <TweakToggle label="Film grain" value={values.showGrain} onChange={v => setValue("showGrain", v)} />
        </TweakSection>

        <TweakSection title="Typography">
          <TweakRadio
            label="Display serif"
            value={values.typeface}
            onChange={v => setValue("typeface", v)}
            options={[
              { value: "fraunces",   label: "Fraunces" },
              { value: "instrument", label: "Instrument Serif" },
            ]}
          />
          <TweakRadio
            label="Title treatment"
            value={values.titleTreatment}
            onChange={v => setValue("titleTreatment", v)}
            options={[
              { value: "gradient",  label: "Gradient italic (hero)" },
              { value: "ink",       label: "Solid ink italic" },
              { value: "serif-all", label: "All serif, no PCIP chip" },
            ]}
          />
        </TweakSection>

        <TweakSection title="Modules">
          <TweakRadio
            label="Card style"
            value={values.cardStyle}
            onChange={v => setValue("cardStyle", v)}
            options={[
              { value: "joined",   label: "Joined glass panel" },
              { value: "floating", label: "Floating tiles" },
              { value: "list",     label: "Minimal list" },
            ]}
          />
          <TweakToggle label="Meta strip" value={values.showMeta} onChange={v => setValue("showMeta", v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
